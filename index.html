<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#FFF7EE" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15110C" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vocard" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <style>
      /* Inline so the very first paint (before main CSS / JS loads) already
         has the theme color on <html> and <body>. iOS PWA standalone mode
         paints the home-indicator strip at the bottom from the body's
         background, so this also fixes the white footer on home screen. */
      html,
      body {
        background-color: #fff7ee;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background-color: #15110c;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito:wght@500;600;700;800&family=Noto+Sans+Thai:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Vocard — Vocabulary Flashcards</title>
  </head>
  <body class="no-select">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
